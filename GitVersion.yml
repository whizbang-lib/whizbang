mode: ContinuousDeployment
branches:
  develop:
    label: alpha
    increment: Patch
    track-merge-target: true
    regex: ^develop$
  release:
    label: ''
    increment: Patch
    prevent-increment:
      of-merged-branch: false
    track-merge-target: false
    regex: ^releases?[/-]
    is-release-branch: true
  main:
    label: ''
    increment: Patch
    prevent-increment:
      of-merged-branch: true
    track-merge-target: false
    regex: ^master$|^main$
    is-main-branch: true
  pull-request:
    label: pr
    increment: Inherit
    label-number-pattern: '[/-](?<number>\d+)'
