name: NuGet Publish (Emergency)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.3.0-alpha.26)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (branch, tag, or SHA). Defaults to current ref.'
        required: false
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

# Minimal top-level permissions; write permissions are declared at job level
permissions: read-all

jobs:
  publish:
    name: Build, Pack & Publish
    runs-on: ubuntu-latest
    environment: nuget-publish
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.ref || github.ref }}

    - name: Setup .NET
      uses: ./.github/actions/setup-dotnet-retry
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      env:
        VERSION: ${{ inputs.version }}
      run: dotnet build --configuration Release --no-restore -p:Version="$VERSION"

    - name: Pack NuGet packages
      env:
        VERSION: ${{ inputs.version }}
      run: |
        # NU5017 false positive for analyzer packages in .NET 10 SDK
        dotnet pack --configuration Release --no-build --output ./packages /p:Version="$VERSION" || true
        ls -la ./packages/*.nupkg
        if [ $(ls ./packages/*.nupkg 2>/dev/null | wc -l) -eq 0 ]; then
          echo "ERROR: No packages were created"
          exit 1
        fi

    - name: NuGet Login (OIDC Trusted Publishing)
      uses: nuget/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
      id: nuget-login
      with:
        user: phil.carbone

    - name: Publish to NuGet
      env:
        NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
      run: dotnet nuget push "./packages/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Generate SHA256 Hashes
      run: |
        cd ./packages
        for file in *.nupkg; do
          sha256sum "$file" > "$file.sha256"
        done

    - name: Determine Release Type
      id: release_type
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Tag if Missing
      env:
        VERSION: ${{ inputs.version }}
      run: |
        TAG="v$VERSION"
        if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
          echo "Tag $TAG already exists"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created tag: $TAG"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
      with:
        tag_name: v${{ inputs.version }}
        name: ${{ steps.release_type.outputs.prerelease == 'true' && format('Pre-release v{0}', inputs.version) || format('Release v{0}', inputs.version) }}
        generate_release_notes: true
        prerelease: ${{ steps.release_type.outputs.prerelease == 'true' }}
        files: |
          ./packages/*.nupkg
          ./packages/*.sha256
        fail_on_unmatched_files: false
        draft: false

    - name: Summary
      env:
        VERSION: ${{ inputs.version }}
      run: |
        PACKAGE_COUNT=$(ls ./packages/*.nupkg 2>/dev/null | wc -l)
        echo "## Published v$VERSION (Emergency)" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Version**: \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Packages**: $PACKAGE_COUNT" >> "$GITHUB_STEP_SUMMARY"
        echo "- **NuGet**: https://www.nuget.org/packages/SoftwareExtravaganza.Whizbang.Core/$VERSION" >> "$GITHUB_STEP_SUMMARY"

    outputs:
      version: ${{ inputs.version }}

  # ============================================================================
  # Notifications
  # ============================================================================

  notify-deployed:
    name: Notify Deployed
    needs: [publish]
    if: success() && vars.PUSHOVER_ENABLED == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/notify-pushover

      - name: Send Notification
        uses: ./.github/actions/notify-pushover
        with:
          api-token: ${{ secrets.PUSHOVER_API_TOKEN }}
          user-key-1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
          user-key-2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
          user-key-3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
          user-key-4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
          user-key-5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
          user-key-6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
          user-key-7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
          user-key-8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
          user-key-9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
          user-key-10: ${{ secrets.PUSHOVER_USER_KEY_10 }}
          title: "🚀 Deployed v${{ needs.publish.outputs.version }} (Emergency)"
          message: "Whizbang v${{ needs.publish.outputs.version }} published to NuGet via emergency workflow"
          status: deployed
          url: "https://www.nuget.org/packages/SoftwareExtravaganza.Whizbang.Core/${{ needs.publish.outputs.version }}"
          url-title: "View on NuGet"

  notify-deploy-failed:
    name: Notify Deploy Failed
    needs: [publish]
    if: failure() && vars.PUSHOVER_ENABLED == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/notify-pushover

      - name: Send Notification
        uses: ./.github/actions/notify-pushover
        with:
          api-token: ${{ secrets.PUSHOVER_API_TOKEN }}
          user-key-1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
          user-key-2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
          user-key-3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
          user-key-4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
          user-key-5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
          user-key-6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
          user-key-7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
          user-key-8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
          user-key-9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
          user-key-10: ${{ secrets.PUSHOVER_USER_KEY_10 }}
          title: "❌ Emergency Deploy Failed"
          message: "Failed to publish Whizbang to NuGet via emergency workflow"
          status: deploy-failed
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          url-title: "View Workflow"
