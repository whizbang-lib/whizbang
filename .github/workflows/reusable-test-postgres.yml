name: PostgreSQL Integration Tests (Reusable)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Build artifact to download (skips build if provided)'
        type: string
        required: false

jobs:
  postgres-tests:
    name: PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Build Artifacts
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact-name }}

      - name: Cache NuGet packages
        if: inputs.artifact-name == ''
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        if: inputs.artifact-name == ''
        run: dotnet restore

      - name: Build Solution
        if: inputs.artifact-name == ''
        run: dotnet build --no-restore --configuration Release -maxcpucount:1

      - name: Run PostgreSQL Integration Tests
        run: |
          # Run PostgreSQL tests per-project for proper coverage collection
          for project in $(find tests -name "*Postgres*.csproj" -type f | sort); do
            echo "Running tests in $project"
            dotnet test "$project" --no-restore --no-build --configuration Release \
              --coverage --coverage-output-format cobertura || true
          done
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'false'

      - name: Upload Coverage
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-postgres
          path: 'tests/**/TestResults/*.cobertura.xml'
          retention-days: 1
