name: InMemory Integration Tests (Reusable)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Build artifact to download (skips build if provided)'
        type: string
        required: false

jobs:
  inmemory-tests:
    name: InMemory Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Build Artifacts
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact-name }}

      - name: Cache NuGet packages
        if: inputs.artifact-name == ''
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        if: inputs.artifact-name == ''
        run: dotnet restore

      - name: Build Solution
        if: inputs.artifact-name == ''
        run: dotnet build --no-restore --configuration Release -maxcpucount:1

      - name: Make Test Executables Executable
        if: inputs.artifact-name != ''
        run: |
          # Artifacts lose execute permissions - restore them
          chmod +x samples/ECommerce/tests/ECommerce.InMemory.Integration.Tests/bin/Release/net10.0/ECommerce.InMemory.Integration.Tests || true

      - name: Run InMemory Integration Tests
        run: |
          echo "Running InMemory integration tests"
          MAX_RETRIES=3
          RETRY_COUNT=0
          PROJECT_PATH="samples/ECommerce/tests/ECommerce.InMemory.Integration.Tests"
          mkdir -p "$PROJECT_PATH/TestResults"
          # TUnit with Microsoft.Testing.Platform compiles to executable
          # Coverage is collected via Microsoft.Testing.Extensions.CodeCoverage
          cd "$PROJECT_PATH/bin/Release/net10.0"
          until ./ECommerce.InMemory.Integration.Tests \
            --coverage \
            --coverage-output-format cobertura \
            --coverage-output coverage.cobertura.xml; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "::error::Tests failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "::warning::Test attempt $RETRY_COUNT failed, retrying..."
            sleep 10
          done
          mv coverage.cobertura.xml "../../../../../$PROJECT_PATH/TestResults/" || true
          cd ../../../../../
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'false'

      - name: Upload Coverage
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-inmemory
          path: 'samples/ECommerce/tests/*/TestResults/*.cobertura.xml'
          retention-days: 1

