name: InMemory Integration Tests (Reusable)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Build artifact to download (skips build if provided)'
        type: string
        required: false

jobs:
  inmemory-tests:
    name: InMemory Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Build Artifacts
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact-name }}

      - name: Cache NuGet packages
        if: inputs.artifact-name == ''
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        if: inputs.artifact-name == ''
        run: dotnet restore

      - name: Build Solution
        if: inputs.artifact-name == ''
        run: dotnet build --no-restore --configuration Release -maxcpucount:1

      - name: Run InMemory Integration Tests
        run: |
          # Run InMemory integration tests using Run-Tests.ps1
          # Uses -ProjectFilter to run only ECommerce.InMemory.Integration.Tests
          pwsh scripts/Run-Tests.ps1 -ProjectFilter "ECommerce.InMemory.Integration" -Mode IntegrationsOnly -Coverage -Configuration Release
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'false'

      - name: Upload Coverage
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-inmemory
          path: 'samples/ECommerce/tests/*/TestResults/*.cobertura.xml'
          retention-days: 1
