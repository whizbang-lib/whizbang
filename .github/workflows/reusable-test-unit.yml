name: Unit Tests (Reusable)

on:
  workflow_call:
    inputs:
      coverage-artifact-name:
        description: 'Coverage-instrumented build artifact (enables -NoBuild with coverage)'
        type: string
        required: false

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Coverage-Instrumented Artifacts
        if: inputs.coverage-artifact-name != ''
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.coverage-artifact-name }}

      - name: Cache NuGet packages
        if: inputs.coverage-artifact-name == ''
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        if: inputs.coverage-artifact-name == ''
        run: dotnet restore

      - name: Build Solution
        if: inputs.coverage-artifact-name == ''
        run: dotnet build --no-restore --configuration Release -maxcpucount:1

      - name: Install dotnet-coverage
        if: inputs.coverage-artifact-name != ''
        run: dotnet tool install --global dotnet-coverage

      # When using pre-instrumented artifacts:
      # 1. Start coverage collection server with matching session ID
      # 2. Run tests with -NoBuild (assemblies are pre-instrumented)
      # 3. Shutdown server to generate coverage report
      - name: Start Coverage Collection Server
        if: inputs.coverage-artifact-name != ''
        run: |
          SESSION_ID="coverage-${{ github.run_id }}"
          echo "Starting coverage collection server with session: $SESSION_ID"
          dotnet-coverage collect --session-id "$SESSION_ID" --server-mode --background \
            -f cobertura -o TestResults/unit.cobertura.xml

      - name: Run Unit Tests (with pre-instrumented coverage)
        if: inputs.coverage-artifact-name != ''
        run: pwsh scripts/Run-Tests.ps1 -Mode Unit -Configuration Release -NoBuild

      - name: Run Unit Tests (with dynamic coverage)
        if: inputs.coverage-artifact-name == ''
        run: pwsh scripts/Run-Tests.ps1 -Mode Unit -Coverage -Configuration Release

      - name: Shutdown Coverage Collection
        if: inputs.coverage-artifact-name != ''
        run: |
          SESSION_ID="coverage-${{ github.run_id }}"
          echo "Shutting down coverage collection session: $SESSION_ID"
          dotnet-coverage shutdown "$SESSION_ID" || true

      - name: Upload Coverage (pre-instrumented)
        if: success() && inputs.coverage-artifact-name != ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit
          path: TestResults/*.cobertura.xml
          retention-days: 1

      - name: Upload Coverage (dynamic)
        if: success() && inputs.coverage-artifact-name == ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit
          path: |
            tests/**/TestResults/*.cobertura.xml
            samples/**/TestResults/*.cobertura.xml
          retention-days: 1
