name: NuGet Pack

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  version:
    name: Calculate Version
    uses: ./.github/workflows/reusable-version.yml

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: version

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0  # GitVersion needs full history

    - name: Setup .NET
      uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0 # v4.3.1
      with:
        dotnet-version: '10.0.x'

    - name: Display Version
      run: |
        echo "Packing version: ${{ needs.version.outputs.semver }}"
        echo "Full SemVer: ${{ needs.version.outputs.fullsemver }}"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore -maxcpucount:1 /p:Version=${{ needs.version.outputs.semver }}

    - name: Pack NuGet packages
      run: |
        # Pack may return non-zero due to NU5017 false positive for analyzer packages
        # The packages are still created successfully, so we verify they exist
        # Override version with GitVersion output
        dotnet pack --configuration Release --no-build --output ./packages /p:Version=${{ needs.version.outputs.semver }} || true

    - name: Verify packages created
      run: |
        # List of all expected packages (with SoftwareExtravaganza prefix)
        # NOTE: Internal packages excluded (IsPackable=false):
        #   - Whizbang.Generators.Shared (ILMerged into generator packages)
        #   - Whizbang.Testing (empty placeholder)
        EXPECTED_PACKAGES=(
          "SoftwareExtravaganza.Whizbang.Core"
          "SoftwareExtravaganza.Whizbang.Generators"
          "SoftwareExtravaganza.Whizbang.Data.Postgres"
          "SoftwareExtravaganza.Whizbang.Data.Schema"
          "SoftwareExtravaganza.Whizbang.Data.Dapper.Custom"
          "SoftwareExtravaganza.Whizbang.Data.Dapper.Postgres"
          "SoftwareExtravaganza.Whizbang.Data.Dapper.Sqlite"
          "SoftwareExtravaganza.Whizbang.Data.EFCore.Custom"
          "SoftwareExtravaganza.Whizbang.Data.EFCore.Postgres"
          "SoftwareExtravaganza.Whizbang.Data.EFCore.Postgres.Generators"
          "SoftwareExtravaganza.Whizbang.Observability"
          "SoftwareExtravaganza.Whizbang.SignalR"
          "SoftwareExtravaganza.Whizbang.Transports.AzureServiceBus"
          "SoftwareExtravaganza.Whizbang.Transports.RabbitMQ"
          "SoftwareExtravaganza.Whizbang.Transports.Mutations"
          "SoftwareExtravaganza.Whizbang.Transports.FastEndpoints"
          "SoftwareExtravaganza.Whizbang.Transports.FastEndpoints.Generators"
          "SoftwareExtravaganza.Whizbang.Transports.HotChocolate"
          "SoftwareExtravaganza.Whizbang.Transports.HotChocolate.Generators"
          "SoftwareExtravaganza.Whizbang.Hosting.Azure.ServiceBus"
          "SoftwareExtravaganza.Whizbang.Hosting.RabbitMQ"
          "SoftwareExtravaganza.Whizbang.Migrate"
          "SoftwareExtravaganza.Whizbang.CLI"
        )

        MISSING=0
        for pkg in "${EXPECTED_PACKAGES[@]}"; do
          if [ ! -f ./packages/${pkg}.*.nupkg ]; then
            echo "ERROR: ${pkg} package not created"
            MISSING=$((MISSING + 1))
          else
            echo "✓ ${pkg}"
          fi
        done

        if [ $MISSING -gt 0 ]; then
          echo ""
          echo "ERROR: ${MISSING} package(s) missing"
          exit 1
        fi

        echo ""
        echo "All ${#EXPECTED_PACKAGES[@]} packages verified successfully"

    - name: List packages
      run: ls -la ./packages

    - name: Upload packages as artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0 # v4.6.2
      with:
        name: nuget-packages
        path: ./packages/*.nupkg
