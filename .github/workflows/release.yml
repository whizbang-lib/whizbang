name: Release

on:
  # Trigger when a release PR is merged to main
  pull_request:
    types: [closed]
    branches: [main]

  # Keep manual trigger for dry runs
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version to release (e.g., 1.2.3 or 1.2.3-beta.1). Leave empty for auto-calculation.'
        required: false
        type: string
      release_type:
        description: 'Release type (ignored if version is specified)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto       # Use GitVersion calculated version
          - major      # Force major version bump (x.0.0)
          - minor      # Force minor version bump (0.x.0)
          - patch      # Force patch version bump (0.0.x)
      dry_run:
        description: 'Dry run (calculate version only, no tag or release)'
        required: false
        default: true
        type: boolean

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

# Top-level permissions for the workflow
permissions:
  contents: write   # For committing version changes and pushing tags
  id-token: write   # For OIDC trusted publishing (inherited by reusable workflows)

jobs:
  # Only run if this is a merged release PR or a manual dry run
  check-release:
    name: Check Release Conditions
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check if release should proceed
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "Manual trigger - dry run mode"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          elif [ "$PR_MERGED" == "true" ]; then
            # Check if PR title matches release pattern
            if [[ "$PR_TITLE" =~ ^chore\(release\):\ v([0-9]+\.[0-9]+\.[0-9]+.*) ]]; then
              VERSION="${BASH_REMATCH[1]}"
              echo "Release PR merged - version: $VERSION"
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version=$VERSION" >> $GITHUB_OUTPUT
            else
              echo "PR merged but not a release PR"
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "version=" >> $GITHUB_OUTPUT
            fi
          else
            echo "PR not merged, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          fi

  version:
    name: Calculate Version
    needs: check-release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      semver: ${{ steps.final_version.outputs.semver }}
      major: ${{ steps.final_version.outputs.major }}
      minor: ${{ steps.final_version.outputs.minor }}
      patch: ${{ steps.final_version.outputs.patch }}
      prerelease: ${{ steps.final_version.outputs.prerelease }}
      fullsemver: ${{ steps.final_version.outputs.fullsemver }}
      informationalversion: ${{ steps.gitversion.outputs.informationalVersion }}
      branchname: ${{ steps.gitversion.outputs.branchName }}
      sha: ${{ steps.gitversion.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@26a89e5dd4fa9ba66a853e04706ba52755ca4057 # v3.1.1
        with:
          versionSpec: '6.0.x'

      - name: Determine Base Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@26a89e5dd4fa9ba66a853e04706ba52755ca4057 # v3.1.1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
        continue-on-error: true

      - name: Fallback Version (if GitVersion fails)
        if: steps.gitversion.outcome == 'failure'
        id: fallback
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          echo "::warning::GitVersion failed, using fallback version extraction"
          # Try to extract from inputs.version first
          if [ -n "$INPUT_VERSION" ]; then
            echo "major=0" >> $GITHUB_OUTPUT
            echo "minor=0" >> $GITHUB_OUTPUT
            echo "patch=0" >> $GITHUB_OUTPUT
            echo "preReleaseTag=" >> $GITHUB_OUTPUT
          else
            # Default fallback
            echo "major=0" >> $GITHUB_OUTPUT
            echo "minor=9" >> $GITHUB_OUTPUT
            echo "patch=99" >> $GITHUB_OUTPUT
            echo "preReleaseTag=fallback" >> $GITHUB_OUTPUT
          fi

      - name: Calculate Final Version
        id: final_version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RELEASE_TYPE: ${{ inputs.release_type }}
          GITVERSION_OUTCOME: ${{ steps.gitversion.outcome }}
          GV_MAJOR: ${{ steps.gitversion.outputs.major }}
          GV_MINOR: ${{ steps.gitversion.outputs.minor }}
          GV_PATCH: ${{ steps.gitversion.outputs.patch }}
          GV_PRERELEASE: ${{ steps.gitversion.outputs.preReleaseTag }}
          FB_MAJOR: ${{ steps.fallback.outputs.major }}
          FB_MINOR: ${{ steps.fallback.outputs.minor }}
          FB_PATCH: ${{ steps.fallback.outputs.patch }}
          FB_PRERELEASE: ${{ steps.fallback.outputs.preReleaseTag }}
        run: |
          # Check if explicit version was provided
          EXPLICIT_VERSION="$INPUT_VERSION"

          if [ -n "$EXPLICIT_VERSION" ]; then
            # Use explicit version - parse it into components
            echo "Using explicit version: $EXPLICIT_VERSION"

            # Parse version (handles both 1.2.3 and 1.2.3-prerelease formats)
            if [[ "$EXPLICIT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-(.+))?$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              PRERELEASE="${BASH_REMATCH[5]}"
            else
              echo "::error::Invalid version format: $EXPLICIT_VERSION. Expected format: X.Y.Z or X.Y.Z-prerelease"
              exit 1
            fi

            SEMVER="$EXPLICIT_VERSION"
            FULLSEMVER="$EXPLICIT_VERSION"
          else
            # Auto-calculate version using GitVersion (with fallback if it failed)
            if [ "$GITVERSION_OUTCOME" == "failure" ]; then
              MAJOR=$FB_MAJOR
              MINOR=$FB_MINOR
              PATCH=$FB_PATCH
              PRERELEASE="$FB_PRERELEASE"
              echo "::warning::Using fallback version values"
            else
              MAJOR=$GV_MAJOR
              MINOR=$GV_MINOR
              PATCH=$GV_PATCH
              PRERELEASE="$GV_PRERELEASE"
            fi

            case "$INPUT_RELEASE_TYPE" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
              auto)
                # Use GitVersion's calculated version as-is
                ;;
            esac

            if [ -n "$PRERELEASE" ]; then
              SEMVER="${MAJOR}.${MINOR}.${PATCH}-${PRERELEASE}"
              FULLSEMVER="${MAJOR}.${MINOR}.${PATCH}-${PRERELEASE}"
            else
              SEMVER="${MAJOR}.${MINOR}.${PATCH}"
              FULLSEMVER="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "fullsemver=$FULLSEMVER" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

          echo "Final version: $SEMVER"

      - name: Display Version Info
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RELEASE_TYPE: ${{ inputs.release_type }}
          SEMVER: ${{ steps.final_version.outputs.semver }}
          FULLSEMVER: ${{ steps.final_version.outputs.fullsemver }}
          V_MAJOR: ${{ steps.final_version.outputs.major }}
          V_MINOR: ${{ steps.final_version.outputs.minor }}
          V_PATCH: ${{ steps.final_version.outputs.patch }}
          V_PRERELEASE: ${{ steps.final_version.outputs.prerelease }}
          GV_BRANCH: ${{ steps.gitversion.outputs.branchName }}
          GV_SHA: ${{ steps.gitversion.outputs.sha }}
        run: |
          echo "## Version Information (Dry Run)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| SemVer | \`$SEMVER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| FullSemVer | \`$FULLSEMVER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Major | $V_MAJOR |" >> $GITHUB_STEP_SUMMARY
          echo "| Minor | $V_MINOR |" >> $GITHUB_STEP_SUMMARY
          echo "| Patch | $V_PATCH |" >> $GITHUB_STEP_SUMMARY
          echo "| PreRelease | $V_PRERELEASE |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | $GV_BRANCH |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | $GV_SHA |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$INPUT_VERSION" ]; then
            echo "| Version Source | Explicit: \`$INPUT_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Version Source | Auto-calculated ($INPUT_RELEASE_TYPE) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo ""
          echo "Calculated version: $SEMVER"
          echo "Full SemVer: $FULLSEMVER"

  release:
    name: Create Release
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if version already exists
        env:
          RELEASE_VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          VERSION="$RELEASE_VERSION"
          TAG="v$VERSION"

          # Check if tag already exists
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists locally"
            exit 1
          fi

          # Check if tag exists on remote
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "::error::Tag $TAG already exists on remote. Version $VERSION has already been released."
            echo ""
            echo "To release a new version, ensure your changes include commits that would bump the version:"
            echo "  - feat: commits bump minor version"
            echo "  - fix: commits bump patch version"
            echo "  - BREAKING CHANGE: bumps major version"
            echo ""
            echo "Or manually specify a release_type (major/minor/patch) when running this workflow."
            exit 1
          fi

          echo "✅ Version $VERSION is available for release"

      # Note: Version update is handled by start-release.yml before PR merge
      # Directory.Build.props already contains the correct version

      - name: Create and Push Tag
        env:
          RELEASE_VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          VERSION="$RELEASE_VERSION"
          TAG="v$VERSION"

          echo "Creating tag: $TAG"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release (stable only)
        if: ${{ !contains(needs.check-release.outputs.version, '-') }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ needs.check-release.outputs.version }}
          name: Release v${{ needs.check-release.outputs.version }}
          generate_release_notes: true
          prerelease: false

      - name: Create GitHub Pre-Release
        if: ${{ contains(needs.check-release.outputs.version, '-') }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ needs.check-release.outputs.version }}
          name: Pre-release v${{ needs.check-release.outputs.version }}
          generate_release_notes: true
          prerelease: true

      - name: Summary
        env:
          RELEASE_VERSION: ${{ needs.check-release.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v$RELEASE_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: [v$RELEASE_VERSION](https://github.com/$REPO/releases/tag/v$RELEASE_VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The NuGet publish workflow will be triggered next." >> $GITHUB_STEP_SUMMARY

  publish:
    name: Publish to NuGet
    needs: [check-release, release]
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/nuget-publish.yml
    with:
      tag: v${{ needs.check-release.outputs.version }}
    # Note: No secrets needed - nuget-publish.yml uses OIDC trusted publishing
    # which relies on id-token permission (declared in the called workflow),
    # not repository secrets
