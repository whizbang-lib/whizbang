name: RabbitMQ Integration Tests (Reusable)

on:
  workflow_call:
    inputs:
      coverage-artifact-name:
        description: 'Coverage-instrumented build artifact (enables -NoBuild with coverage)'
        type: string
        required: false

jobs:
  rabbitmq-tests:
    name: RabbitMQ Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Coverage-Instrumented Artifacts
        if: inputs.coverage-artifact-name != ''
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.coverage-artifact-name }}

      - name: Cache NuGet packages
        if: inputs.coverage-artifact-name == ''
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        if: inputs.coverage-artifact-name == ''
        run: dotnet restore

      - name: Build Solution
        if: inputs.coverage-artifact-name == ''
        run: dotnet build --no-restore --configuration Release -maxcpucount:1

      - name: Install dotnet-coverage
        if: inputs.coverage-artifact-name != ''
        run: dotnet tool install --global dotnet-coverage

      - name: Start Coverage Collection Server
        if: inputs.coverage-artifact-name != ''
        run: |
          SESSION_ID="coverage-${{ github.run_id }}"
          echo "Starting coverage collection server with session: $SESSION_ID"
          dotnet-coverage collect --session-id "$SESSION_ID" --server-mode --background \
            -f cobertura -o TestResults/rabbitmq.cobertura.xml

      # TEMPORARY: continue-on-error due to lifecycle tests being skipped for v0.8.5-beta.1
      # TUnit returns exit code 8 when all tests are skipped, which we treat as success
      - name: Run RabbitMQ Integration Tests (with pre-instrumented coverage)
        if: inputs.coverage-artifact-name != ''
        continue-on-error: true
        run: pwsh scripts/Run-Tests.ps1 -Mode Integration -Configuration Release -Tag RabbitMQ -NoBuild
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'false'

      - name: Run RabbitMQ Integration Tests (with dynamic coverage)
        if: inputs.coverage-artifact-name == ''
        continue-on-error: true
        run: pwsh scripts/Run-Tests.ps1 -Mode Integration -Coverage -Configuration Release -Tag RabbitMQ
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'false'

      - name: Shutdown Coverage Collection
        if: inputs.coverage-artifact-name != ''
        run: |
          SESSION_ID="coverage-${{ github.run_id }}"
          echo "Shutting down coverage collection session: $SESSION_ID"
          dotnet-coverage shutdown "$SESSION_ID" || true

      - name: Upload Coverage (pre-instrumented)
        if: success() && inputs.coverage-artifact-name != ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-rabbitmq
          path: TestResults/*.cobertura.xml
          retention-days: 1

      - name: Upload Coverage (dynamic)
        if: success() && inputs.coverage-artifact-name == ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-rabbitmq
          path: 'samples/ECommerce/tests/**/TestResults/*.cobertura.xml'
          retention-days: 1
