name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  # Use head branch for PRs, ref_name for pushes - ensures push and PR from same branch share group
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.version.outputs.semver }}
      fullsemver: ${{ steps.version.outputs.fullsemver }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Calculate Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, use fixed validation version
            VERSION="0.0.0-pr.${{ github.event.pull_request.number }}"
            echo "semver=$VERSION" >> $GITHUB_OUTPUT
            echo "fullsemver=$VERSION" >> $GITHUB_OUTPUT
            echo "prerelease=pr.${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "Using PR validation version: $VERSION"
          else
            # For pushes to branches, use GitVersion
            echo "Use GitVersion for branch pushes (not implemented yet)"
            echo "semver=0.9.1-alpha.999" >> $GITHUB_OUTPUT
            echo "fullsemver=0.9.1-alpha.999" >> $GITHUB_OUTPUT
            echo "prerelease=alpha.999" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build
    needs: version
    uses: ./.github/workflows/reusable-build.yml

  unit-tests:
    name: Unit Tests
    needs: build
    uses: ./.github/workflows/reusable-test-unit.yml
    with:
      # Use pre-built artifacts with in-job instrumentation for coverage
      artifact-name: build-${{ github.run_id }}

  postgres-integration:
    name: PostgreSQL Integration
    needs: build
    uses: ./.github/workflows/reusable-test-postgres.yml
    with:
      artifact-name: build-${{ github.run_id }}

  inmemory-integration:
    name: InMemory Integration
    needs: build
    uses: ./.github/workflows/reusable-test-inmemory.yml
    with:
      artifact-name: build-${{ github.run_id }}

  rabbitmq-integration:
    name: RabbitMQ Integration
    needs: build
    uses: ./.github/workflows/reusable-test-rabbitmq.yml
    with:
      artifact-name: build-${{ github.run_id }}

  servicebus-integration:
    name: Service Bus Integration
    needs: build
    uses: ./.github/workflows/reusable-test-servicebus.yml
    with:
      artifact-name: build-${{ github.run_id }}

  quality:
    name: Quality
    needs: [unit-tests, postgres-integration, inmemory-integration, rabbitmq-integration, servicebus-integration]
    uses: ./.github/workflows/reusable-quality.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  version-comment:
    name: Comment Version on PR
    needs: version
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create or Update Version Comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SEMVER: ${{ needs.version.outputs.semver }}
          FULLSEMVER: ${{ needs.version.outputs.fullsemver }}
          PRERELEASE: ${{ needs.version.outputs.prerelease || 'none' }}
        run: |
          BODY="📦 **Version Information**: \`$SEMVER\`

          | Property | Value |
          |----------|-------|
          | SemVer | \`$SEMVER\` |
          | Full SemVer | \`$FULLSEMVER\` |
          | Pre-release | \`$PRERELEASE\` |"

          # Find existing version comment
          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --jq '.[] | select(.body | startswith("📦")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment: $COMMENT_ID"
            gh api --method PATCH "repos/$REPO/issues/comments/$COMMENT_ID" -f body="$BODY"
          else
            echo "Creating new version comment"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
          fi
