name: CI

on:
  push:
    branches:
      - develop        # release.yml handles post-merge to main
  pull_request:
    branches: [main, develop, 'release/**']
  workflow_dispatch:

permissions:
  contents: write    # Required for nuget-publish to create tags and releases
  id-token: write    # Required for NuGet OIDC trusted publishing
  pull-requests: write  # Required for version comment on PRs

concurrency:
  # Use head branch for PRs, ref_name for pushes - ensures push and PR from same branch share group
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'samples/**'
              - 'tools/**'
              - 'benchmarks/**'
              - '*.sln*'
              - '**/*.csproj'
              - '**/*.props'
              - '**/*.targets'
              - 'Directory.Build.*'
              - 'Directory.Packages.props'
              - 'global.json'
              - 'nuget.config'

  version:
    name: Version
    uses: ./.github/workflows/reusable-version.yml

  build:
    name: Build
    needs: [version, changes]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-build.yml

  unit-tests:
    name: Unit Tests
    needs: build
    uses: ./.github/workflows/reusable-test-unit.yml
    with:
      # Use pre-built artifacts with in-job instrumentation for coverage
      artifact-name: build-${{ github.run_id }}

  postgres-integration:
    name: PostgreSQL Integration
    needs: build
    uses: ./.github/workflows/reusable-test-postgres.yml
    with:
      artifact-name: build-${{ github.run_id }}

  inmemory-integration:
    name: InMemory Integration
    needs: build
    uses: ./.github/workflows/reusable-test-inmemory.yml
    with:
      artifact-name: build-${{ github.run_id }}

  rabbitmq-integration:
    name: RabbitMQ Integration
    needs: build
    uses: ./.github/workflows/reusable-test-rabbitmq.yml
    with:
      artifact-name: build-${{ github.run_id }}

  servicebus-integration:
    name: Service Bus Integration
    needs: build
    uses: ./.github/workflows/reusable-test-servicebus.yml
    with:
      artifact-name: build-${{ github.run_id }}

  quality:
    name: Quality
    needs: [unit-tests, postgres-integration, inmemory-integration, rabbitmq-integration, servicebus-integration]
    uses: ./.github/workflows/reusable-quality.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Pack NuGet Packages - validates packability and produces artifacts
  # ============================================================================

  pack:
    name: Pack NuGet Packages
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-retry
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Download build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: build-${{ github.run_id }}

      - name: Pack NuGet packages (no rebuild)
        env:
          VERSION: ${{ needs.version.outputs.semver }}
        run: |
          # NU5017 false positive for analyzer packages in .NET 10 SDK
          dotnet pack --configuration Release --no-build --output ./packages /p:Version="$VERSION" || true

      - name: Verify expected packages
        run: |
          # NOTE: Internal packages excluded (IsPackable=false):
          #   - Whizbang.Generators.Shared (ILMerged into generator packages)
          #   - Whizbang.Testing (empty placeholder)
          EXPECTED_PACKAGES=(
            "SoftwareExtravaganza.Whizbang.Core"
            "SoftwareExtravaganza.Whizbang.Generators"
            "SoftwareExtravaganza.Whizbang.Data.Postgres"
            "SoftwareExtravaganza.Whizbang.Data.Schema"
            "SoftwareExtravaganza.Whizbang.Data.Dapper.Custom"
            "SoftwareExtravaganza.Whizbang.Data.Dapper.Postgres"
            "SoftwareExtravaganza.Whizbang.Data.Dapper.Sqlite"
            "SoftwareExtravaganza.Whizbang.Data.EFCore.Custom"
            "SoftwareExtravaganza.Whizbang.Data.EFCore.Postgres"
            "SoftwareExtravaganza.Whizbang.Data.EFCore.Postgres.Generators"
            "SoftwareExtravaganza.Whizbang.Observability"
            "SoftwareExtravaganza.Whizbang.SignalR"
            "SoftwareExtravaganza.Whizbang.Transports.AzureServiceBus"
            "SoftwareExtravaganza.Whizbang.Transports.RabbitMQ"
            "SoftwareExtravaganza.Whizbang.Transports.Mutations"
            "SoftwareExtravaganza.Whizbang.Transports.FastEndpoints"
            "SoftwareExtravaganza.Whizbang.Transports.FastEndpoints.Generators"
            "SoftwareExtravaganza.Whizbang.Transports.HotChocolate"
            "SoftwareExtravaganza.Whizbang.Transports.HotChocolate.Generators"
            "SoftwareExtravaganza.Whizbang.Hosting.AspNet"
            "SoftwareExtravaganza.Whizbang.Hosting.Azure.ServiceBus"
            "SoftwareExtravaganza.Whizbang.Hosting.RabbitMQ"
            "SoftwareExtravaganza.Whizbang.Migrate"
            "SoftwareExtravaganza.Whizbang.CLI"
          )

          MISSING=0
          for pkg in "${EXPECTED_PACKAGES[@]}"; do
            if [ ! -f ./packages/${pkg}.*.nupkg ]; then
              echo "ERROR: ${pkg} package not created"
              MISSING=$((MISSING + 1))
            else
              echo "✓ ${pkg}"
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo ""
            echo "ERROR: ${MISSING} package(s) missing"
            exit 1
          fi

          echo ""
          echo "All ${#EXPECTED_PACKAGES[@]} packages verified successfully"

      - name: List packages
        run: ls -la ./packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: nuget-packages-${{ github.run_id }}
          path: ./packages/*.nupkg
          retention-days: 3

  version-comment:
    name: Comment Version on PR
    needs: version
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create or Update Version Comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SEMVER: ${{ needs.version.outputs.semver }}
          FULLSEMVER: ${{ needs.version.outputs.fullsemver }}
          PRERELEASE: ${{ needs.version.outputs.prerelease || 'none' }}
        run: |
          BODY="📦 **Version Information**: \`$SEMVER\`

          | Property | Value |
          |----------|-------|
          | SemVer | \`$SEMVER\` |
          | Full SemVer | \`$FULLSEMVER\` |
          | Pre-release | \`$PRERELEASE\` |"

          # Find existing version comment
          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --jq '.[] | select(.body | startswith("📦")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment: $COMMENT_ID"
            gh api --method PATCH "repos/$REPO/issues/comments/$COMMENT_ID" -f body="$BODY"
          else
            echo "Creating new version comment"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
          fi

  # ============================================================================
  # Prerelease NuGet Publish - Auto-publish on develop push
  # ============================================================================

  prerelease-publish:
    name: Publish Prerelease NuGet
    needs: [version, pack]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/nuget-push.yml
    with:
      version: ${{ needs.version.outputs.semver }}
      artifact-name: nuget-packages-${{ github.run_id }}
    secrets:
      PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
      PUSHOVER_USER_KEY_1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
      PUSHOVER_USER_KEY_2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
      PUSHOVER_USER_KEY_3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
      PUSHOVER_USER_KEY_4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
      PUSHOVER_USER_KEY_5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
      PUSHOVER_USER_KEY_6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
      PUSHOVER_USER_KEY_7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
      PUSHOVER_USER_KEY_8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
      PUSHOVER_USER_KEY_9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
      PUSHOVER_USER_KEY_10: ${{ secrets.PUSHOVER_USER_KEY_10 }}

  # ============================================================================
  # Notifications - Send push notifications on build completion
  # ============================================================================

  notify-success:
    name: Notify Success
    needs: [changes, quality]
    if: |
      always() &&
      github.ref != 'refs/heads/develop' &&
      (needs.quality.result == 'success' || (needs.changes.outputs.code != 'true' && github.event_name == 'pull_request')) &&
      vars.PUSHOVER_ENABLED == 'true'
    uses: ./.github/workflows/notify-build-status.yml
    with:
      status: success
    secrets:
      PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
      PUSHOVER_USER_KEY_1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
      PUSHOVER_USER_KEY_2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
      PUSHOVER_USER_KEY_3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
      PUSHOVER_USER_KEY_4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
      PUSHOVER_USER_KEY_5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
      PUSHOVER_USER_KEY_6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
      PUSHOVER_USER_KEY_7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
      PUSHOVER_USER_KEY_8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
      PUSHOVER_USER_KEY_9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
      PUSHOVER_USER_KEY_10: ${{ secrets.PUSHOVER_USER_KEY_10 }}

  notify-failure:
    name: Notify Failure
    needs: [build, unit-tests, postgres-integration, inmemory-integration, rabbitmq-integration, servicebus-integration, quality]
    if: failure() && github.ref != 'refs/heads/develop' && vars.PUSHOVER_ENABLED == 'true'
    uses: ./.github/workflows/notify-build-status.yml
    with:
      status: failure
    secrets:
      PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
      PUSHOVER_USER_KEY_1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
      PUSHOVER_USER_KEY_2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
      PUSHOVER_USER_KEY_3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
      PUSHOVER_USER_KEY_4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
      PUSHOVER_USER_KEY_5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
      PUSHOVER_USER_KEY_6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
      PUSHOVER_USER_KEY_7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
      PUSHOVER_USER_KEY_8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
      PUSHOVER_USER_KEY_9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
      PUSHOVER_USER_KEY_10: ${{ secrets.PUSHOVER_USER_KEY_10 }}

  notify-cancelled:
    name: Notify Cancelled
    needs: [build, unit-tests, postgres-integration, inmemory-integration, rabbitmq-integration, servicebus-integration, quality]
    if: cancelled() && github.ref != 'refs/heads/develop' && vars.PUSHOVER_ENABLED == 'true'
    uses: ./.github/workflows/notify-build-status.yml
    with:
      status: cancelled
    secrets:
      PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
      PUSHOVER_USER_KEY_1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
      PUSHOVER_USER_KEY_2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
      PUSHOVER_USER_KEY_3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
      PUSHOVER_USER_KEY_4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
      PUSHOVER_USER_KEY_5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
      PUSHOVER_USER_KEY_6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
      PUSHOVER_USER_KEY_7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
      PUSHOVER_USER_KEY_8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
      PUSHOVER_USER_KEY_9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
      PUSHOVER_USER_KEY_10: ${{ secrets.PUSHOVER_USER_KEY_10 }}
