name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  # Use head branch for PRs, ref_name for pushes - ensures push and PR from same branch share group
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'samples/**'
              - 'tools/**'
              - 'benchmarks/**'
              - '*.sln*'
              - '**/*.csproj'
              - '**/*.props'
              - '**/*.targets'
              - 'Directory.Build.*'
              - 'Directory.Packages.props'
              - 'global.json'
              - 'nuget.config'

  version:
    name: Version
    uses: ./.github/workflows/reusable-version.yml

  build:
    name: Build
    needs: [version, changes]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-build.yml

  unit-tests:
    name: Unit Tests
    needs: build
    uses: ./.github/workflows/reusable-test-unit.yml
    with:
      # Use pre-built artifacts with in-job instrumentation for coverage
      artifact-name: build-${{ github.run_id }}

  postgres-integration:
    name: PostgreSQL Integration
    needs: build
    uses: ./.github/workflows/reusable-test-postgres.yml
    with:
      artifact-name: build-${{ github.run_id }}

  inmemory-integration:
    name: InMemory Integration
    needs: build
    uses: ./.github/workflows/reusable-test-inmemory.yml
    with:
      artifact-name: build-${{ github.run_id }}

  rabbitmq-integration:
    name: RabbitMQ Integration
    needs: build
    uses: ./.github/workflows/reusable-test-rabbitmq.yml
    with:
      artifact-name: build-${{ github.run_id }}

  servicebus-integration:
    name: Service Bus Integration
    needs: build
    uses: ./.github/workflows/reusable-test-servicebus.yml
    with:
      artifact-name: build-${{ github.run_id }}

  quality:
    name: Quality
    needs: [unit-tests, postgres-integration, inmemory-integration, rabbitmq-integration, servicebus-integration]
    uses: ./.github/workflows/reusable-quality.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  version-comment:
    name: Comment Version on PR
    needs: version
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create or Update Version Comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SEMVER: ${{ needs.version.outputs.semver }}
          FULLSEMVER: ${{ needs.version.outputs.fullsemver }}
          PRERELEASE: ${{ needs.version.outputs.prerelease || 'none' }}
        run: |
          BODY="📦 **Version Information**: \`$SEMVER\`

          | Property | Value |
          |----------|-------|
          | SemVer | \`$SEMVER\` |
          | Full SemVer | \`$FULLSEMVER\` |
          | Pre-release | \`$PRERELEASE\` |"

          # Find existing version comment
          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --jq '.[] | select(.body | startswith("📦")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment: $COMMENT_ID"
            gh api --method PATCH "repos/$REPO/issues/comments/$COMMENT_ID" -f body="$BODY"
          else
            echo "Creating new version comment"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
          fi

  # ============================================================================
  # Prerelease NuGet Publish - Auto-publish on develop push
  # ============================================================================

  prerelease-publish:
    name: Publish Prerelease NuGet
    needs: [version, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: nuget-publish
    permissions:
      contents: read
      id-token: write  # Required for NuGet trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-retry
        with:
          dotnet-version: '10.0.x'

      - name: Display Version
        env:
          SEMVER: ${{ needs.version.outputs.semver }}
          FULLSEMVER: ${{ needs.version.outputs.fullsemver }}
          IS_PRERELEASE: ${{ needs.version.outputs.is_prerelease }}
        run: |
          echo "Publishing prerelease version: $SEMVER"
          echo "Full SemVer: $FULLSEMVER"
          echo "Is prerelease: $IS_PRERELEASE"

      - name: Verify Prerelease Version
        env:
          SEMVER: ${{ needs.version.outputs.semver }}
        run: |
          # Safety check: only publish prerelease versions from develop
          if [[ ! "$SEMVER" =~ -[a-zA-Z] ]]; then
            echo "::error::Version $SEMVER is not a prerelease version. Refusing to publish stable version from develop branch."
            exit 1
          fi
          echo "Verified: $SEMVER is a prerelease version"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        env:
          SEMVER: ${{ needs.version.outputs.semver }}
        run: dotnet build --configuration Release --no-restore -maxcpucount:1 -p:Version=$SEMVER

      - name: Pack NuGet packages
        env:
          SEMVER: ${{ needs.version.outputs.semver }}
        run: |
          # NU5017 false positive for analyzer packages in .NET 10 SDK
          dotnet pack --configuration Release --no-build --output ./packages -p:Version=$SEMVER || true
          # Verify packages were created
          PACKAGE_COUNT=$(ls ./packages/*.nupkg 2>/dev/null | wc -l)
          if [ "$PACKAGE_COUNT" -eq 0 ]; then
            echo "::error::No packages were created"
            exit 1
          fi
          echo "Created $PACKAGE_COUNT packages"
          ls -la ./packages/*.nupkg

      - name: NuGet Login (OIDC Trusted Publishing)
        uses: nuget/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
        id: nuget-login
        with:
          user: phil.carbone

      - name: Publish to NuGet
        run: dotnet nuget push "./packages/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Summary
        env:
          SEMVER: ${{ needs.version.outputs.semver }}
        run: |
          PACKAGE_COUNT=$(ls ./packages/*.nupkg 2>/dev/null | wc -l)
          echo "## Prerelease Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`$SEMVER\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Packages**: $PACKAGE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: develop branch auto-publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View on NuGet: https://www.nuget.org/packages/SoftwareExtravaganza.Whizbang.Core/$SEMVER" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Notifications - Send push notifications on build completion
  # ============================================================================

  notify-success:
    name: Notify Success
    needs: [changes, quality]
    if: |
      always() &&
      (needs.quality.result == 'success' || (needs.changes.outputs.code != 'true' && github.event_name == 'pull_request')) &&
      vars.PUSHOVER_ENABLED == 'true'
    uses: ./.github/workflows/notify-build-status.yml
    with:
      status: success
    secrets:
      PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
      PUSHOVER_USER_KEY_1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
      PUSHOVER_USER_KEY_2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
      PUSHOVER_USER_KEY_3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
      PUSHOVER_USER_KEY_4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
      PUSHOVER_USER_KEY_5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
      PUSHOVER_USER_KEY_6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
      PUSHOVER_USER_KEY_7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
      PUSHOVER_USER_KEY_8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
      PUSHOVER_USER_KEY_9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
      PUSHOVER_USER_KEY_10: ${{ secrets.PUSHOVER_USER_KEY_10 }}

  notify-failure:
    name: Notify Failure
    needs: [build, unit-tests, postgres-integration, inmemory-integration, rabbitmq-integration, servicebus-integration, quality]
    if: failure() && vars.PUSHOVER_ENABLED == 'true'
    uses: ./.github/workflows/notify-build-status.yml
    with:
      status: failure
    secrets:
      PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
      PUSHOVER_USER_KEY_1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
      PUSHOVER_USER_KEY_2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
      PUSHOVER_USER_KEY_3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
      PUSHOVER_USER_KEY_4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
      PUSHOVER_USER_KEY_5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
      PUSHOVER_USER_KEY_6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
      PUSHOVER_USER_KEY_7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
      PUSHOVER_USER_KEY_8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
      PUSHOVER_USER_KEY_9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
      PUSHOVER_USER_KEY_10: ${{ secrets.PUSHOVER_USER_KEY_10 }}

  notify-cancelled:
    name: Notify Cancelled
    needs: [build, unit-tests, postgres-integration, inmemory-integration, rabbitmq-integration, servicebus-integration, quality]
    if: cancelled() && vars.PUSHOVER_ENABLED == 'true'
    uses: ./.github/workflows/notify-build-status.yml
    with:
      status: cancelled
    secrets:
      PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
      PUSHOVER_USER_KEY_1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
      PUSHOVER_USER_KEY_2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
      PUSHOVER_USER_KEY_3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
      PUSHOVER_USER_KEY_4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
      PUSHOVER_USER_KEY_5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
      PUSHOVER_USER_KEY_6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
      PUSHOVER_USER_KEY_7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
      PUSHOVER_USER_KEY_8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
      PUSHOVER_USER_KEY_9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
      PUSHOVER_USER_KEY_10: ${{ secrets.PUSHOVER_USER_KEY_10 }}
