name: Build (Reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to stamp into assemblies (from GitVersion). If empty, uses Directory.Build.props default.'
        required: false
        type: string
        default: ''

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-retry
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Display .NET Info
        run: dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore

      - name: Clean Solution
        run: dotnet clean --configuration Release

      - name: Build Solution
        run: |
          VERSION_ARGS=""
          if [ -n "${{ inputs.version }}" ]; then
            VERSION_ARGS="-p:Version=${{ inputs.version }}"
          fi
          dotnet build --no-restore --configuration Release -maxcpucount:1 $VERSION_ARGS

      - name: Verify Code Formatting
        run: dotnet format --verify-no-changes --no-restore

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: build-${{ github.run_id }}
          path: |
            **/bin/Release
            **/obj/Release
            !**/obj/Release/**/ref/**
            !**/obj/Release/**/refint/**
          retention-days: 1
          compression-level: 6
